upstream mining_ws_upstream {
  least_conn;
  server mining-gateway-1:8081 max_fails=3 fail_timeout=10s;
  server mining-gateway-2:8081 max_fails=3 fail_timeout=10s;
  keepalive 128;
}

upstream app_rest_upstream {
  least_conn;
  server host.docker.internal:3000;
  keepalive 64;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  '' close;
}

server {
  listen 80;
  server_name _;

  real_ip_header CF-Connecting-IP;
  set_real_ip_from 0.0.0.0/0;

  client_max_body_size 1m;
  keepalive_timeout 65;

  location /ws/mining {
    proxy_pass http://mining_ws_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location /api/ {
    proxy_pass http://app_rest_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  location / {
    proxy_pass http://app_rest_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
