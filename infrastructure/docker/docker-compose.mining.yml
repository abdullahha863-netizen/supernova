version: "3.9"

services:
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - "5672:5672"
      - "15672:15672"

  mining-gateway-1:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mining
    command: node services/mining-gateway/server.mjs
    environment:
      MINING_WS_HOST: 0.0.0.0
      MINING_WS_PORT: 8081
      MINING_WS_PATH: /ws/mining
      MINING_WS_CLUSTER: "false"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      KASPA_RPC_URL: ${KASPA_RPC_URL}
      KASPA_RPC_USERNAME: ${KASPA_RPC_USERNAME:-}
      KASPA_RPC_PASSWORD: ${KASPA_RPC_PASSWORD:-}
      KASPA_NETWORK: ${KASPA_NETWORK:-mainnet}
      KASPA_POOL_ADDRESS: ${KASPA_POOL_ADDRESS}
    depends_on:
      - redis
      - rabbitmq

  mining-gateway-2:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mining
    command: node services/mining-gateway/server.mjs
    environment:
      MINING_WS_HOST: 0.0.0.0
      MINING_WS_PORT: 8081
      MINING_WS_PATH: /ws/mining
      MINING_WS_CLUSTER: "false"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      KASPA_RPC_URL: ${KASPA_RPC_URL}
      KASPA_RPC_USERNAME: ${KASPA_RPC_USERNAME:-}
      KASPA_RPC_PASSWORD: ${KASPA_RPC_PASSWORD:-}
      KASPA_NETWORK: ${KASPA_NETWORK:-mainnet}
      KASPA_POOL_ADDRESS: ${KASPA_POOL_ADDRESS}
    depends_on:
      - redis
      - rabbitmq

  stratum-gateway-1:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mining
    command: node services/stratum-gateway/server.mjs
    environment:
      STRATUM_HOST: 0.0.0.0
      STRATUM_V1_PORT: 3333
      STRATUM_V2_PORT: 3334
      STRATUM_CLUSTER: "false"
      STRATUM_AUTO_REGISTER_MINERS: "false"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      KASPA_RPC_URL: ${KASPA_RPC_URL}
      KASPA_RPC_USERNAME: ${KASPA_RPC_USERNAME:-}
      KASPA_RPC_PASSWORD: ${KASPA_RPC_PASSWORD:-}
      KASPA_NETWORK: ${KASPA_NETWORK:-mainnet}
      KASPA_POOL_ADDRESS: ${KASPA_POOL_ADDRESS}
    depends_on:
      - redis
      - rabbitmq

  stratum-gateway-2:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mining
    command: node services/stratum-gateway/server.mjs
    environment:
      STRATUM_HOST: 0.0.0.0
      STRATUM_V1_PORT: 3333
      STRATUM_V2_PORT: 3334
      STRATUM_CLUSTER: "false"
      STRATUM_AUTO_REGISTER_MINERS: "false"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: ${DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-secret-change-me}
      KASPA_RPC_URL: ${KASPA_RPC_URL}
      KASPA_RPC_USERNAME: ${KASPA_RPC_USERNAME:-}
      KASPA_RPC_PASSWORD: ${KASPA_RPC_PASSWORD:-}
      KASPA_NETWORK: ${KASPA_NETWORK:-mainnet}
      KASPA_POOL_ADDRESS: ${KASPA_POOL_ADDRESS}
    depends_on:
      - redis
      - rabbitmq

  mining-worker-1:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mining
    command: node services/workers/share-consumer.mjs
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: ${DATABASE_URL}
      MINING_BATCH_SIZE: 300
      MINING_BATCH_FLUSH_MS: 1000
      MINING_QUEUE_PREFETCH: 800
      KASPA_RPC_URL: ${KASPA_RPC_URL}
      KASPA_RPC_USERNAME: ${KASPA_RPC_USERNAME:-}
      KASPA_RPC_PASSWORD: ${KASPA_RPC_PASSWORD:-}
      KASPA_NETWORK: ${KASPA_NETWORK:-mainnet}
      KASPA_POOL_ADDRESS: ${KASPA_POOL_ADDRESS}
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  mining-worker-2:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mining
    command: node services/workers/share-consumer.mjs
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DATABASE_URL: ${DATABASE_URL}
      MINING_BATCH_SIZE: 300
      MINING_BATCH_FLUSH_MS: 1000
      MINING_QUEUE_PREFETCH: 800
      KASPA_RPC_URL: ${KASPA_RPC_URL}
      KASPA_RPC_USERNAME: ${KASPA_RPC_USERNAME:-}
      KASPA_RPC_PASSWORD: ${KASPA_RPC_PASSWORD:-}
      KASPA_NETWORK: ${KASPA_NETWORK:-mainnet}
      KASPA_POOL_ADDRESS: ${KASPA_POOL_ADDRESS}
    depends_on:
      - redis
      - rabbitmq
    restart: unless-stopped

  stats-worker:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.mining
    command: node services/workers/stats-aggregator.mjs
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      - redis
    restart: unless-stopped

  mining-lb:
    image: nginx:1.27-alpine
    ports:
      - "8080:80"
      - "3333:3333"
      - "3334:3334"
    volumes:
      - ../nginx/nginx.mining.conf:/etc/nginx/nginx.conf:ro
      - ../nginx/mining.conf:/etc/nginx/conf.d/default.conf:ro
      - ../nginx/stratum.stream.conf:/etc/nginx/stratum.stream.conf:ro
    depends_on:
      - mining-gateway-1
      - mining-gateway-2
      - stratum-gateway-1
      - stratum-gateway-2
